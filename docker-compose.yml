version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: docuquery_db
    environment:
      POSTGRES_USER: docuquery
      POSTGRES_PASSWORD: docuquery
      POSTGRES_DB: docuquery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuquery"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: docuquery_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app

  frontend:
    image: nginx:alpine
    container_name: docuquery_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - api

volumes:
  pgdata:
